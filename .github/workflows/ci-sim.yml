name: CI Simulation (GitHub Actions)

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "App version to test (1, 2, or 3)"
        required: true
        default: "1"

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      APP_VERSION: ${{ github.event.inputs.app_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Show selected version
        run: echo "Testing app version v${APP_VERSION}"

      - name: Build Docker image for this version
        working-directory: ./simulate-cicd
        run: |
          docker build \
            --build-arg APP_VERSION="${APP_VERSION}" \
            -t simulate-cicd:test .

      - name: Run tests in container
        run: |
          docker run --rm simulate-cicd:test
